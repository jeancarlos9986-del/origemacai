<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Entregador | Nova Origem Açaí
    </title>

    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nova Origem">
    <link rel="apple-touch-icon" href="./logonovonova.png.jpeg">

    <!-- ✅ Adicionei fonte igual ao painel da cozinha -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* ✅ Fonte melhorada */
        }

        :root {
            --bg: #0b0b0f;
            --card: #17171f;
            --card2: #1f2937;
            --primary: #0284c7;
            /* ✅ Cor principal para entregador */
            --green: #00c853;
            --yellow: #f59e0b;
            --red: #ff1744;
            --text: #ffffff;
            --muted: #9ca3af;
            --entrega: #0284c7;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area img {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            border: 2px solid var(--primary);
            /* ✅ Destaque na logo */
            object-fit: cover;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .online {
            background: rgba(0, 200, 83, .15);
            color: #00ff84;
            border: 1px solid rgba(0, 200, 83, .4);
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #aviso-instalar {
            display: none;
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 14px;
            text-align: center;
            font-weight: 700;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        /* ✅ Card melhorado */
        .card-entrega {
            background: var(--card);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 18px;
            border: 2px solid rgba(2, 132, 199, 0.2);
            transition: .3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .card-entrega::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--entrega);
        }

        .card-entrega:hover {
            transform: translateY(-3px);
            border-color: rgba(2, 132, 199, 0.5);
        }

        .info-valor {
            background: var(--card2);
            border-radius: 18px;
            padding: 16px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            line-height: 1.8;
        }

        .btn-rota {
            background: #4285F4;
            color: white;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            transition: .2s;
        }

        .btn-rota:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-acao {
            border: none;
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            font-size: 0.9rem;
        }

        .btn-acao:hover {
            transform: scale(1.02);
        }

        .btn-iniciar {
            background: var(--yellow);
            color: white;
        }

        .btn-concluir {
            background: var(--green);
            color: white;
        }

        .btn-zap {
            background: #25D366;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: .2s;
        }

        .btn-zap:hover {
            transform: scale(1.1);
        }

        .sem-pedidos {
            text-align: center;
            margin-top: 100px;
            color: var(--muted);
        }

        .sem-pedidos i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: .5;
        }

        .alerta-pago {
            border-radius: 12px 12px 0 0;
            margin: -22px -22px 18px -22px !important;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        @media(max-width:700px) {
            body {
                padding: 15px;
            }

            .topbar {
                align-items: flex-start;
            }

            .logo-area h1 {
                font-size: 1.4rem;
            }
        }
    </style>

</head>

<body>

    <div id="aviso-instalar">
        <i class="fa-solid fa-circle-info"></i> 📲 Instale o aplicativo na tela inicial para acessar mais rápido.
    </div>

    <header class="topbar">

        <div class="logo-area">
            <img src="./logonovonova.png.jpeg" alt="Nova Origem">
            <div>
                <h1>
                    Painel do Entregador
                </h1>
                <p style="color:#9ca3af; font-size:0.9rem;">
                    Nova Origem Açaí • Entregas em Tempo Real
                </p>
            </div>
        </div>

        <div class="online">
            <i class="fa-solid fa-circle-pulse"></i> Sistema Online
        </div>

    </header>

    <main id="lista-entregas">
        <div class="sem-pedidos">
            <i class="fa-solid fa-motorcycle"></i>
            <h2>Nenhuma entrega pendente</h2>
            <p>Os pedidos prontos para entrega aparecerão aqui automaticamente.</p>
        </div>
    </main>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js");
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile && !isStandalone) {
                document.getElementById("aviso-instalar").style.display = "block";
            }
        });
    </script>

    <script type="module" src="./entregador.js">
    </script>

</body>

</html>
