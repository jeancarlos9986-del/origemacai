<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cozinha | Nova Origem Açaí</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --bg: #0b0b0f;
            --card: #17171f;
            --card2: #1f2937;
            --primary: #7c3aed;
            --green: #00c853;
            --yellow: #f59e0b;
            --red: #ff1744;
            --text: #ffffff;
            --muted: #9ca3af;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area img {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            object-fit: cover;
        }

        .logo-area h1 {
            font-size: 2rem;
            font-weight: 800;
        }

        .online-status {
            background: rgba(0, 200, 83, .15);
            border: 1px solid rgba(0, 200, 83, .4);
            color: #00ff84;
            padding: 12px 18px;
            border-radius: 16px;
            font-weight: 700;
        }

        .painel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
        }

        .pedido-card {
            background: var(--card);
            border-radius: 24px;
            padding: 22px;
            border: 2px solid rgba(255, 255, 255, .05);
            transition: .2s;
        }

        .pedido-card.novo {
            border-color: rgba(124, 58, 237, .5);
        }

        .pedido-card.preparo {
            border-color: rgba(245, 158, 11, .5);
        }

        .pedido-card.finalizado {
            border-color: rgba(0, 200, 83, .5);
            opacity: .9;
        }

        .pedido-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            gap: 10px;
        }

        .pedido-numero {
            font-size: 1.3rem;
            font-weight: 800;
            color: #c084fc;
        }

        .pedido-hora {
            color: var(--muted);
            font-size: .9rem;
            margin-top: 5px;
        }

        .pedido-status {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: .8rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .status-novo {
            background: rgba(124, 58, 237, .15);
            color: #c084fc;
        }

        .status-preparo {
            background: rgba(245, 158, 11, .15);
            color: #fbbf24;
        }

        .status-finalizado {
            background: rgba(0, 200, 83, .15);
            color: #00ff84;
        }

        .cliente-box {
            background: rgba(255, 255, 255, .03);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 18px;
            line-height: 1.8;
        }

        .cliente-box strong {
            color: white;
        }

        .pedido-itens {
            background: var(--card2);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 18px;
        }

        .pedido-item {
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
        }

        .pedido-item:last-child {
            border-bottom: none;
        }

        .pedido-item strong {
            display: block;
            margin-bottom: 6px;
        }

        .item-extra {
            color: #c084fc;
            font-size: .9rem;
            line-height: 1.5;
        }

        .item-gratis {
            color: #00ff84;
            font-size: .9rem;
            line-height: 1.5;
        }

        .item-obs {
            color: #facc15;
            font-size: .9rem;
            line-height: 1.5;
        }

        .pedido-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pedido-total {
            font-size: 1.3rem;
            font-weight: 800;
            color: #00ff84;
        }

        .acoes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .acoes button {
            border: none;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            color: white;
            transition: .2s;
        }

        .acoes button:hover {
            transform: scale(1.03);
        }

        .btn-preparo {
            background: var(--yellow);
        }

        .btn-finalizar {
            background: var(--green);
        }

        .btn-remover {
            background: var(--red);
        }

        .sem-pedidos {
            text-align: center;
            margin-top: 120px;
            color: var(--muted);
        }

        .sem-pedidos i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: .5;
        }

        @media(max-width:700px) {

            body {
                padding: 18px;
            }

            .topbar {
                align-items: flex-start;
            }

            .logo-area h1 {
                font-size: 1.5rem;
            }

            .pedido-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .acoes {
                width: 100%;
                flex-direction: column;
            }

            .acoes button {
                width: 100%;
            }
        }
    </style>

</head>

<body>

    <header class="topbar">

        <div class="logo-area">

            <img src="./logo.png" alt="Logo">

            <div>

                <h1>Painel da Cozinha</h1>

                <p style="color:#9ca3af;">
                    Nova Origem Açaí
                </p>

            </div>

        </div>

        <div class="online-status">

            <i class="fa-solid fa-circle"></i>
            Sistema Online

        </div>

    </header>

    <main>

        <div id="painelPedidos" class="painel"></div>

        <div id="semPedidos" class="sem-pedidos">

            <i class="fa-solid fa-burger"></i>

            <h2>Nenhum pedido no momento</h2>

            <p>
                Os pedidos realizados no site aparecerão aqui automaticamente.
            </p>

        </div>

    </main>

    <script type="module" src="./cozinha.js"></script>

</body>

</html>
