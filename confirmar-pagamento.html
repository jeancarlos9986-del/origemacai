<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Confirmação de Pagamento</title>
    <!-- ✅ CORREÇÃO: Usando tipo module e versões corretas -->
    <script type="module">
        // ==============================================
        // ✅ CORREÇÃO: IMPORTAÇÕES OBRIGATÓRIAS DO FIREBASE
        // ==============================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            query, 
            where, 
            getDocs, 
            updateDoc 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ==============================================
        // 🔴 CONFIGURAÇÕES DO SEU FIREBASE (IGUAL COZINHA)
        // ==============================================
        const firebaseConfig = {
            apiKey: "AIzaSyC_zNrNdstdLSa95AjYF_W8XFMwIwlq4DE",
            authDomain: "fb-pedidos.firebaseapp.com",
            projectId: "fb-pedidos",
            storageBucket: "fb-pedidos.firebasestorage.app",
            messagingSenderId: "440937401229",
            appId: "1:440937401229:web:4a27c27a69792eb25bcbc4"
        };

        // Inicializa Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🔴 SUA CHAVE DO MERCADO PAGO (JÁ ESTÁ CERTA!)
        const MP_TOKEN = "APP_USR-227919236312518-060911-f6b282e1962824f92ec1d24d4e986a9-3260785733";

        // ==============================================
        // 🚀 FUNÇÃO QUE VERIFICA E LIBERA PARA COZINHA
        // ==============================================
        async function verificarPagamento(idPagamento) {
            try {
                // 1. Consulta Mercado Pago
                const resposta = await fetch(`https://api.mercadopago.com/v1/payments/${idPagamento}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${MP_TOKEN}`
                    }
                });

                const dados = await resposta.json();
                console.log("🔍 Status:", dados.status);

                // 2. Se PAGO: Muda status para NOVO → CAI NA COZINHA
                if (dados.status === "approved") {
                    
                    // Procura o pedido salvo como "aguardando_pagamento"
                    const pedidosRef = collection(db, "pedidos");
                    const consulta = query(pedidosRef, where("id_pagamento_mp", "==", Number(idPagamento)));
                    const resultado = await getDocs(consulta);

                    if (resultado.empty) {
                        document.body.innerHTML = "<h2 style='color:red;'>❌ Pedido não encontrado no banco</h2>";
                        return;
                    }

                    // 3. ATUALIZA PARA NOVO → A COZINHA VÊ AGORA!
                    let dadosPedido;
                    resultado.forEach(async (doc) => {
                        dadosPedido = doc.data();
                        await updateDoc(doc.ref, {
                            status: "novo", // ✅ MESMO STATUS DO DINHEIRO/CARTÃO
                            data_pagamento: new Date()
                        });
                        console.log("✅ PEDIDO LIBERADO PARA COZINHA!");
                    });

                    // ==============================================
                    // 📩 ✅ ADICIONADO: ABRE WHATSAPP AUTOMÁTICO
                    // ==============================================
                    if (dadosPedido) {
                        // Monta mensagem igual ao seu site
                        const itensTexto = dadosPedido.itens.map(item => `
• ${item.nome}
${item.gratis?.length ? `Grátis: ${item.gratis.join(", ")}` : ""}
${item.extras?.length ? `Extras: ${item.extras.join(", ")}` : ""}
${item.obs ? `Obs: ${item.obs}` : ""}
                        `).join("\n");

                        const mensagem = encodeURIComponent(`
🛒 PEDIDO CONFIRMADO - NOVA ORIGEM AÇAÍ ✅

👤 Cliente: ${dadosPedido.nome}
📞 WhatsApp: ${dadosPedido.fone}
📦 Entrega: ${dadosPedido.entrega}
📍 Endereço: ${dadosPedido.endereco || "Retirada"}

📋 ITENS:
${itensTexto}

💰 Total: R$ ${dadosPedido.total.toFixed(2)}
💳 Pagamento: PIX ✅

O pagamento foi confirmado! Já estamos preparando seu pedido 🧡
Agradecemos a preferência!
                        `);

                        // Abre o WhatsApp do cliente
                        window.open(`https://wa.me/55${dadosPedido.fone.replace(/\D/g, '')}?text=${mensagem}`, '_blank');
                        
                        document.body.innerHTML = `
                            <div style="font-family: Arial; text-align:center; margin-top:50px;">
                                <h2 style="color:green;">✅ PAGAMENTO CONFIRMADO!</h2>
                                <p>Pedido enviado para a cozinha.</p>
                                <p>WhatsApp enviado automaticamente para o cliente.</p>
                            </div>
                        `;
                    }

                } else if (dados.status === "pending") {
                    document.body.innerHTML = "<h2 style='color:orange;'>⏳ Aguardando pagamento...</h2>";
                } else {
                    document.body.innerHTML = `<h2 style='color:red;'>❌ Status: ${dados.status}</h2>`;
                }

            } catch (erro) {
                console.error("❌ Erro:", erro);
                document.body.innerHTML = `<h2 style='color:red;'>❌ Erro: ${erro.message}</h2>`;
            }
        }

        // ==============================================
        // 📥 RECEBE O AVISO
        // ==============================================
        const parametros = new URLSearchParams(window.location.search);
        const idRecebido = parametros.get('id');

        if (idRecebido) {
            verificarPagamento(idRecebido);
        } else {
            document.body.innerHTML = `
                <div style="font-family: Arial; text-align:center; margin-top:50px; color:#666;">
                    <h2>🔄 Aguardando notificação do Mercado Pago...</h2>
                    <p>Essa página receberá o aviso automaticamente.</p>
                </div>
            `;
        }
    </script>
</head>
<body style="background:#f8f9fa; margin:0; padding:20px;">
    <!-- Conteúdo gerado pelo script -->
</body>
</html>
