<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlo Geral - F&B Burguer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <button id="btn-sair" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Sair do Sistema</button>
    <style>
        :root {
            --primary: #ff9800;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Dashboard Layout */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-bottom: 4px solid var(--primary);
        }

        .stat-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin: 0;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            height: 300px;
        }

        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-header">
        <h1><i class="fas fa-crown text-primary"></i> Painel de Controlo Geral</h1>
        <button onclick="window.print()" class="btn-filtro"><i class="fas fa-file-pdf"></i> Exportar Relatório</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Faturamento Bruto</h3>
            <div class="value" id="faturamento-bruto">R$ 0,00</div>
            <small id="qtd-pedidos">0 pedidos realizados</small>
        </div>
        <div class="stat-card" style="border-bottom-color: #f44336;">
            <h3>Custo de Insumos (CMV)</h3>
            <div class="value" id="custo-total">R$ 0,00</div>
            <small>Baseado em margem de 35%</small>
        </div>
        <div class="stat-card" style="border-bottom-color: #4caf50;">
            <h3>Lucro Estimado</h3>
            <div class="value" id="lucro-liquido">R$ 0,00</div>
            <small>Líquido após taxas e insumos</small>
        </div>
        <div class="stat-card" style="border-bottom-color: #2196f3;">
            <h3>Ticket Médio</h3>
            <div class="value" id="ticket-medio">R$ 0,00</div>
            <small>Média por cliente</small>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <h3 style="font-size: 0.9rem;">Vendas por Hora</h3>
            <canvas id="vendasHoraChart"></canvas>
        </div>
        <div class="chart-box">
            <h3 style="font-size: 0.9rem;">Meios de Pagamento</h3>
            <canvas id="pagamentoChart"></canvas>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
